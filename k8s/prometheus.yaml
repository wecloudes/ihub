apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ihub
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: ihub
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: ihub
        metrics_path: /api/metrics
        static_configs:
          - targets: ["ihub-server.ihub.svc.cluster.local:80"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: ihub
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: ihub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: ihub
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: ihub
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
  selector:
    app.kubernetes.io/name: prometheus
