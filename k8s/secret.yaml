apiVersion: v1
kind: Secret
metadata:
  name: ihub-secrets
  namespace: ihub
  labels:
    app.kubernetes.io/name: ihub
    app.kubernetes.io/component: server
type: Opaque
stringData:
  # Change these before deploying
  IHUB_ADMIN_USERNAME: "admin"
  IHUB_ADMIN_PASSWORD: "change-me-to-a-strong-key"
  # Optional: uncomment to enable
  # SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/T.../B.../xxx"
  # AUTH0_DOMAIN: "myapp.auth0.com"
  # AUTH0_CLIENT_ID: "your-client-id"
  # AUTH0_AUDIENCE: "ihub-api"
