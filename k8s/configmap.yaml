apiVersion: v1
kind: ConfigMap
metadata:
  name: ihub-config
  namespace: ihub
  labels:
    app.kubernetes.io/name: ihub
    app.kubernetes.io/component: server
data:
  ihub.config.json: |
    {
      "server": {
        "port": 3000,
        "db_path": "/data/ihub.db"
      },
      "auth0": {
        "enabled": false,
        "domain": "",
        "client_id": "",
        "audience": "ihub-api"
      },
      "slack": {
        "enabled": false,
        "webhook_url": "",
        "digest_interval_hours": 168
      },
      "metrics": {
        "enabled": true
      },
      "audit": {
        "enabled": true,
        "log_anonymous": true
      }
    }
