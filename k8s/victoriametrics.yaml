apiVersion: v1
kind: ConfigMap
metadata:
  name: victoriametrics-config
  namespace: ihub
  labels:
    app.kubernetes.io/name: victoriametrics
    app.kubernetes.io/part-of: ihub
data:
  scrape.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: ihub
        metrics_path: /api/metrics
        static_configs:
          - targets: ["ihub-server.ihub.svc.cluster.local:80"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoriametrics
  namespace: ihub
  labels:
    app.kubernetes.io/name: victoriametrics
    app.kubernetes.io/part-of: ihub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: victoriametrics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: victoriametrics
    spec:
      containers:
        - name: victoriametrics
          image: victoriametrics/victoria-metrics:latest
          args:
            - "-promscrape.config=/etc/victoriametrics/scrape.yml"
            - "-storageDataPath=/victoria-metrics-data"
            - "-retentionPeriod=30d"
          ports:
            - containerPort: 8428
          volumeMounts:
            - name: config
              mountPath: /etc/victoriametrics
            - name: data
              mountPath: /victoria-metrics-data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: victoriametrics-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: victoriametrics
  namespace: ihub
  labels:
    app.kubernetes.io/name: victoriametrics
    app.kubernetes.io/part-of: ihub
spec:
  type: ClusterIP
  ports:
    - port: 8428
      targetPort: 8428
  selector:
    app.kubernetes.io/name: victoriametrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victorialogs
  namespace: ihub
  labels:
    app.kubernetes.io/name: victorialogs
    app.kubernetes.io/part-of: ihub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: victorialogs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: victorialogs
    spec:
      containers:
        - name: victorialogs
          image: victoriametrics/victoria-logs:latest
          args:
            - "-storageDataPath=/victoria-logs-data"
            - "-retentionPeriod=30d"
          ports:
            - containerPort: 9428
          volumeMounts:
            - name: data
              mountPath: /victoria-logs-data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: victorialogs
  namespace: ihub
  labels:
    app.kubernetes.io/name: victorialogs
    app.kubernetes.io/part-of: ihub
spec:
  type: ClusterIP
  ports:
    - port: 9428
      targetPort: 9428
  selector:
    app.kubernetes.io/name: victorialogs
